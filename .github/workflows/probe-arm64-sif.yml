name: Probe ARM64 SIF build

on:
  push:
    paths:
      - ".github/workflows/probe-arm64-sif.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record latest build run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/build-arm64-sif.yml/runs?per_page=1" \
            --jq '.workflow_runs[0] | {id,run_number,status,conclusion,head_sha,created_at,updated_at,html_url}' \
            > WORKFLOW_STATUS.json
          cat WORKFLOW_STATUS.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add WORKFLOW_STATUS.json
          git commit -m "Probe ARM64 SIF build status" || exit 0
          git push
